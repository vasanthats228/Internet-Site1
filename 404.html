<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>404 · Page Not Found | Stackly Internet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8edf3 100%);
            font-family: 'Inter', 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* Container with animation */
        .error-container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 102, 204, 0.1);
            animation: fadeSlideUp 0.6s ease-out;
        }

        /* Icon with floating animation */
        .error-icon {
            font-size: 5rem;
            color: #0066cc;
            margin-bottom: 1rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        /* 404 Number with pulse animation */
        .error-code {
            font-size: 5rem;
            font-weight: 800;
            color: #1a2c3e;
            line-height: 1;
            margin-bottom: 0.5rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -2px;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Title with fade in */
        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a2c3e;
            margin-bottom: 0.75rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            opacity: 0;
            animation: fadeIn 0.6s ease-out forwards;
            animation-delay: 0.2s;
        }

        /* Description with fade in */
        .error-description {
            font-size: 0.9rem;
            color: #4a627a;
            margin-bottom: 2rem;
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 0.6s ease-out forwards;
            animation-delay: 0.3s;
        }

        /* Button Group */
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeIn 0.6s ease-out forwards;
            animation-delay: 0.4s;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .btn-home {
            background: linear-gradient(135deg, #0066cc, #004099);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.25);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 102, 204, 0.35);
            background: linear-gradient(135deg, #0088ff, #0055cc);
        }

        .btn-home:active {
            transform: translateY(0);
        }

        .btn-go-back {
            background: transparent;
            color: #0066cc;
            border: 1.5px solid #0066cc;
        }

        .btn-go-back:hover {
            background: rgba(0, 102, 204, 0.08);
            transform: translateY(-3px);
        }

        .btn-go-back:active {
            transform: translateY(0);
        }

        /* Animations */
        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(1.05);
            }
        }

        /* Responsive */
        @media (max-width: 550px) {
            .error-container {
                padding: 2rem 1.5rem;
            }
            .error-code {
                font-size: 3.5rem;
            }
            .error-icon {
                font-size: 3.5rem;
            }
            .error-title {
                font-size: 1.25rem;
            }
            .button-group {
                flex-direction: column;
                gap: 0.75rem;
            }
            .btn {
                width: 100%;
                padding: 0.7rem 1.2rem;
            }
        }

        @media (max-width: 380px) {
            .error-container {
                padding: 1.5rem 1rem;
            }
            .error-code {
                font-size: 2.8rem;
            }
            .error-icon {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <!-- Icon with float animation -->
        <div class="error-icon">
            <i class="fas fa-globe"></i>
        </div>
        
        <!-- 404 Code with pulse animation -->
        <div class="error-code">404</div>
        
        <!-- Title -->
        <div class="error-title">Page Not Found</div>
        
        <!-- Description -->
        <div class="error-description">
            The page you're looking for doesn't exist or has been moved.<br>
            Let's get you back on track.
        </div>
        
        <!-- Buttons - Back to Home & Go Back (Previous Page functionality) -->
        <div class="button-group">
            <a href="home.html" class="btn btn-home">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <a href="javascript:history.back()" class="btn btn-go-back">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
        </div>
    </div>

    <script>
        // Simple console message
        console.log('%c🌐 Stackly Internet - 404 Page', 'color: #0066cc; font-size: 12px; font-weight: bold;');
        console.log('Page not found. Use the buttons above to navigate back.');
        
        // Add animation on button click
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });
    </script>
</body>
</html>
